<h1>Task Tracker</h1>

@if (hasError()) {
    <div class="error-message">Could not load tasks. Please try again later.</div>
}

@if (isLoading()) {
    <div class="loading-message">Loading...</div>
}

@if (!hasError()) {
    <form (ngSubmit)="createTask()">
        <input (input)="newTitle.set($any($event.target).value)" placeholder="Title">
        <input (input)="newDescription.set($any($event.target).value)" placeholder="Description">
        <button [disabled]="isSubmitting()" class="create-btn">Create</button>
    </form>
    <div>{{ completedCount() }} of {{ totalCount() }} completed</div>

    @for (task of taskSignal(); track task.id) {
        <app-task-item
            [task]="task"
            [isSubmitting]="isSubmitting()"
            [countdowns]="countdowns()"
            (deleteTask)="deleteTask($event)"
            (toggleTask)="toggleTask($event)"
            (saveEdit)="onSaveEdit($event)"
        />
    } @empty {
        <div class="empty-state">No tasks yet — create one above.</div>
    }
}

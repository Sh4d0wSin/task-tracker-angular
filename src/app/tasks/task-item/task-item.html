<div class="task-item" [class.completed-card]="task.completed">
    @if (isEditing()) {
        <div class="edit-inputs">
            <input [value]="editTitle()" (input)="editTitle.set($any($event.target).value)">
            <input [value]="editDescription()" (input)="editDescription.set($any($event.target).value)">
        </div>
        <div class="edit-actions">
            <button [disabled]="isSubmitting" (click)="onSaveEdit()">Save</button>
            <button (click)="cancelEdit()">Cancel</button>
        </div>
    } @else {
        <div class="task-title" [class.completed]="task.completed">{{task.title}}</div>
        <div class="task-description">{{task.description}}</div>
        <div class="task-actions">
            <button (click)="startEdit()">Edit</button>
            <button [disabled]="isSubmitting" (click)="toggleTask.emit(task)">
                @if (countdowns[task.id]) {
                    Undo ({{ countdowns[task.id] }})
                } @else {
                    @if (task.completed) {Undo} @else {Complete}
                }
            </button>
            <button [disabled]="isSubmitting" (click)="deleteTask.emit(task.id)">Delete</button>
        </div>
    }
</div>
